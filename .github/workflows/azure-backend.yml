name: Deploy Backend to Azure VM

on:
  push:
    branches:
      - master
    paths:
      - 'Backend/**'
      - '.github/workflows/azure-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd Backend
          mvn clean package -DskipTests

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "Backend/target/*.jar"
          target: "/home/azureuser/app"
          strip_components: 2

      - name: Setup Environment and Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p /home/azureuser/app
            
            # Create .env file on the VM (It stays on Azure)
            cat <<EOF > /home/azureuser/app/.env
            SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/projectmeeting
            SPRING_DATASOURCE_USERNAME=postgres
            SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
            SPRING_MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            SPRING_MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }}
            JWT_PUBLIC_KEY=${{ secrets.JWT_PUBLIC_KEY }}
            SPRING_DATA_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            EOF

            # Kill any existing process on 8080 and any running Java apps
            sudo fuser -k 8080/tcp || true
            pkill -f "java -jar" || true
            sleep 2
            
            # Start the newest uploaded application
            cd /home/azureuser/app
            NEWEST_JAR=$(ls -t *.jar | head -n 1)
            nohup java -jar $NEWEST_JAR > app.log 2>&1 < /dev/null &


name: Deploy Backend to Azure VM

on:
  push:
    branches:
      - master
    paths:
      - 'Backend/**'
      - '.github/workflows/azure-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd Backend
          mvn clean package -DskipTests

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "Backend/target/*.jar"
          target: "/home/azureuser/app"
          strip_components: 2

      - name: Setup Environment and Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p /home/azureuser/app
            
            # Create .env file on the VM (It stays on Azure)
            cat <<EOF > /home/azureuser/app/.env
            SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/projectmeeting
            SPRING_DATASOURCE_USERNAME=postgres
            SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
            SPRING_MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            SPRING_MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }}
            JWT_PUBLIC_KEY=${{ secrets.JWT_PUBLIC_KEY }}
            SPRING_DATA_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            EOF

            # Find the newest uploaded JAR and rename it to app.jar
            cd /home/azureuser/app
            NEWEST_JAR=$(ls -t *.jar | grep -v 'app.jar' | head -n 1)
            
            if [ -n "$NEWEST_JAR" ]; then
              echo "Deploying new JAR: $NEWEST_JAR"
              cp "$NEWEST_JAR" app.jar
            fi
            
            # Create or update the systemd service
            sudo bash -c 'cat > /etc/systemd/system/projectdiscussion.service <<EOT
            [Unit]
            Description=ProjectDiscussion Backend
            After=network.target

            [Service]
            User=azureuser
            WorkingDirectory=/home/azureuser/app
            ExecStart=/usr/bin/java -jar /home/azureuser/app/app.jar
            SuccessExitStatus=143
            Restart=always
            RestartSec=5
            EnvironmentFile=/home/azureuser/app/.env

            [Install]
            WantedBy=multi-user.target
            EOT'
            
            # Reload systemd and restart the app securely
            sudo systemctl daemon-reload
            sudo systemctl enable projectdiscussion
            sudo systemctl restart projectdiscussion
            
            echo "Deployment successful. App is running via systemd."



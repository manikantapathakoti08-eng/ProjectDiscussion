# =====================================
# APPLICATION CONFIG
# =====================================
spring.application.name=skillSwap
server.port=8443

# =====================================
# HTTPS / SSL CONFIGURATION
# =====================================
server.ssl.enabled=true
server.ssl.key-store=classpath:skillSwap.p12
# Replace 'your_keystore_password' with the password you used to create the .p12 file
server.ssl.key-store-password=Mani@062004
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=skillswap
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

# =====================================
# DATABASE CONFIG (PostgreSQL)
# =====================================
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=Mani@062004
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pooling (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=SkillSwapHikariPool

# =====================================
# JPA / HIBERNATE CONFIG
# =====================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'validate' ensures your Java code matches your PostgreSQL tables exactly
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =====================================
# RSA Keys for Asymmetric JWT Signing (RS256)
# Private Key (Base64 PKCS#8) - Used for Signing
jwt.private-
# Public Key (Base64 X.509) - Used for Verification
jwt.public-
# Access Token lasts 15 Minutes (900,000 milliseconds)
jwt.expiration=900000

# Refresh Token lasts 24 Hours (86,400,000 milliseconds)
jwt.refresh-expiration=86400000

# =====================================
# SECURITY & LOGGING
# =====================================
# Set to DEBUG to see JWT filter logs and authentication errors in the console
logging.level.org.springframework.security=DEBUG
logging.level.com.example.skillSwap=DEBUG

# =====================================
# ACTUATOR (Monitoring)
# =====================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always



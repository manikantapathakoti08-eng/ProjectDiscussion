# =====================================
# APPLICATION CONFIG
# =====================================
spring.application.name=projectMeeting
server.port=8080

# =====================================
# HTTPS / SSL CONFIGURATION (DISABLED)
# =====================================
server.ssl.enabled=false

# =====================================
# DATABASE CONFIG (PostgreSQL)
# =====================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pooling (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=ProjectMeetingHikariPool

# =====================================
# JPA / HIBERNATE CONFIG
# =====================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'validate' ensures your Java code matches your PostgreSQL tables exactly
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =====================================
# RSA Keys for Asymmetric JWT Signing (RS256)
# Private Key (Base64 PKCS#8) - Used for Signing
jwt.private-key=${JWT_PRIVATE_KEY}
# Public Key (Base64 X.509) - Used for Verification
jwt.public-key=${JWT_PUBLIC_KEY}
# Access Token lasts 15 Minutes (900,000 milliseconds)
jwt.expiration=900000

# Refresh Token lasts 24 Hours (86,400,000 milliseconds)
jwt.refresh-expiration=86400000

# =====================================
# SECURITY & LOGGING
# =====================================
# Set to DEBUG to see JWT filter logs and authentication errors in the console
logging.level.org.springframework.security=DEBUG
logging.level.com.example.skillSwap=DEBUG

# =====================================
# ACTUATOR (Monitoring)
# =====================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


# 📧 GMAIL SMTP CONFIGURATION
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Optional: This shows the email logs in your console for debugging
spring.mail.properties.mail.debug=true



springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html




